<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Plans | FitPlan</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
  <style>
    .filter-section {
      background: var(--color-surface);
      padding: 1.5rem;
      border-radius: 10px;
      border: 1px solid var(--color-border);
      margin-bottom: 2rem;
      position: sticky;
      top: 1rem;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    
    .plan-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .plan-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .plan-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }
    .plan-meta {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .plan-exercises-preview {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 1.5rem;
      flex: 1;
    }
    .plan-actions {
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid var(--color-border);
      padding-top: 1rem;
      margin-top: auto;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }
    .modal-content {
      background: var(--color-surface);
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    .close-modal {
      background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--color-text-muted);
    }
    
    .exercise-list-item {
      display: flex;
      padding: 1rem 0;
      border-bottom: 1px solid var(--color-border);
    }
    .exercise-list-item:last-child { border-bottom: none; }
    .exercise-order {
      width: 30px; height: 30px;
      background: var(--color-bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 500; font-size: 0.85rem; margin-right: 1rem;
    }
    
    .tabs-toggle {
      display: inline-flex;
      background: var(--color-bg);
      border-radius: 8px;
      padding: 0.25rem;
      border: 1px solid var(--color-border);
    }
    .tabs-toggle button {
      background: transparent; border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 500; color: var(--color-text-muted); transition: all 0.2s;
    }
    .tabs-toggle button.active {
      background: var(--color-surface); color: var(--color-text-main); box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body class="page-transition">

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-accent)"><path d="M17.5 4.5c-2.5 0-4.5 2-4.5 4.5v1H9V9c0-2.5-2-4.5-4.5-4.5S0 6.5 0 9c0 3.5 4 8 11.5 14.5l.5.5.5-.5C20 17 24 12.5 24 9c0-2.5-2-4.5-4.5-4.5zM12 21.5C5.5 15.5 2 11.5 2 9c0-1.5 1-2.5 2.5-2.5S7 7.5 7 9v3h10V9c0-1.5 1-2.5 2.5-2.5S22 7.5 22 9c0 2.5-3.5 6.5-10 12.5z"/></svg>
        <div class="logo-text">FitPlan</div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Dashboard
        </a>
        <a href="plans.html" class="nav-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          My Plans
        </a>
        <a href="generator.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          Generator
        </a>
        <a href="logs.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
          Progress Logs
        </a>
        <a href="profile.html" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile-sm">
          <div class="avatar user-avatar-display"></div>
          <div>
            <div class="user-name-display" style="font-weight: 500; font-size: 0.9rem;"></div>
            <a href="#" class="logout-btn text-muted" style="font-size: 0.8rem; text-decoration: none;">Sign Out</a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div class="d-flex justify-between align-center mb-4">
        <div>
          <h1 style="margin-bottom: 0;">Workout Plans</h1>
          <p class="text-muted">Manage your custom routines or browse templates.</p>
        </div>
        <div class="tabs-toggle">
          <button class="active" id="tab-my-plans">My Plans</button>
          <button id="tab-templates">Templates</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-section">
        <div class="grid-3 mb-2">
          <div class="form-group mb-0">
            <input type="text" id="search-input" class="form-control" placeholder="Search plans...">
          </div>
          <div class="form-group mb-0">
            <select id="duration-select" class="form-control">
              <option value="">Any Duration</option>
              <option value="under30">Under 30 min</option>
              <option value="30to45">30-45 min</option>
              <option value="45to60">45-60 min</option>
              <option value="60plus">60+ min</option>
            </select>
          </div>
          <div class="form-group mb-0">
            <select id="sort-select" class="form-control">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="az">A-Z</option>
              <option value="duration">Shortest Duration</option>
            </select>
          </div>
        </div>
        
        <div class="d-flex align-center gap-3">
          <div class="filter-row" id="type-filters" style="margin-bottom:0">
            <span style="font-size: 0.85rem; color:var(--color-text-muted); margin-right:0.5rem; align-self:center;">Type:</span>
            <button class="filter-pill active" data-val="all">All</button>
            <button class="filter-pill" data-val="strength">Strength</button>
            <button class="filter-pill" data-val="cardio">Cardio</button>
            <button class="filter-pill" data-val="hiit">HIIT</button>
            <button class="filter-pill" data-val="mixed">Mixed</button>
          </div>
          
          <div class="filter-row" id="intensity-filters" style="margin-bottom:0">
            <span style="font-size: 0.85rem; color:var(--color-text-muted); margin-right:0.5rem; align-self:center;">Level:</span>
            <button class="filter-pill active" data-val="all">All</button>
            <button class="filter-pill" data-val="beginner">Beginner</button>
            <button class="filter-pill" data-val="intermediate">Intermediate</button>
            <button class="filter-pill" data-val="advanced">Advanced</button>
          </div>
        </div>
      </div>

      <!-- Plans Grid -->
      <div class="grid-2" id="plans-container">
        <!-- Rendered via JS -->
        <div class="text-center text-muted" style="grid-column: span 2; padding: 4rem 0;">Loading plans...</div>
      </div>

    </main>
  </div>

  <!-- Plan Detail Modal -->
  <div class="modal-overlay" id="plan-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="d-flex gap-1 mb-1" id="modal-badges"></div>
          <h2 id="modal-title" style="margin-bottom: 0;">Plan Title</h2>
          <p class="text-muted" id="modal-meta" style="font-size:0.9rem;"></p>
        </div>
        <button class="close-modal" id="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modal-desc" class="mb-3"></p>
        <h3 style="font-size:0.9rem;">Exercises (<span id="modal-ex-count">0</span>)</h3>
        <div id="modal-exercises-list">
          <!-- Rendered via JS -->
        </div>
      </div>
      <div class="modal-footer" id="modal-footer">
        <!-- Rendered via JS based on plan ownership -->
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/plans.js"></script>
</body>
</html>
